

services:
  app:
    build: .
    container_name: meu-app-devops
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/loja
    depends_on:
      - db
    # Note: Removemos o "ports" daqui, pois agora só o Nginx fala com o app

  db:
    image: postgres:15
    container_name: meu-banco-dados
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=loja
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    container_name: meu-servidor-web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:latest
    container_name: meu-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - default

  grafana:
    image: grafana/grafana:latest
    container_name: meu-grafana
    ports:
      - "3000:3000"
    networks:
      - default
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Senha temporária

volumes:
  postgres_data: