name: Docker CI

on:
  push:
    branches: [ "main", "feat/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # --- NOVO: Configura o Python para rodar as ferramentas de qualidade ---
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 bandit

    - name: Lint with flake8 (Erros de Sintaxe e Estilo)
      run: |
        # Para o build se houver erros críticos de sintaxe (E9, F63, F7, F82)
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Security Check with Bandit (Segurança)
      run: |
        # Procura por falhas de segurança conhecidas no código
        bandit -r src/

    # --- PASSO QUE VOCÊ JÁ TINHA ---
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag meu-app-ci:$(date +%s)