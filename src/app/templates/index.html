<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minha Loja DevOps</title>
</head>
<body>
    <h1>🛒 Loja do Sival</h1>
    <p>Produto: Camiseta DevOps - <strong>R$ 50,00</strong></p>
    <form action="/comprar" method="POST">
        <label for="nome_cliente">Seu Nome:</label>
        <input type="text" id="nome_cliente" name="nome_cliente" required>
        <button type="submit">Finalizar Compra</button>
    </form>
    <hr>
    <p><strong>Status:</strong> {{ mensagem }}</p>
</body>
</html>
