{% extends "base.html" %}
{% block content %}
<div class="text-center mb-5">
    <h1 class="display-4 fw-bold">Produtos em Destaque</h1>
    <p class="text-muted">Aproveite nossas ofertas exclusivas para a comunidade DevOps.</p>
</div>

<div class="row g-4">
    {% for produto in produtos %}
    <div class="col-md-4">
        <div class="card h-100 border-0 shadow-sm">
            <div class="bg-secondary text-white text-center py-5 rounded-top">
                <i class="display-1">📦</i>
            </div>
            <div class="card-body">
                <h5 class="card-title">{{ produto.nome }}</h5>
                <h4 class="text-primary">R$ {{ produto.preco }}</h4>
                <p class="card-text text-muted">Disponível: {{ produto.estoque }} unidades</p>
                <form action="/comprar" method="POST">
                    <input type="hidden" name="produto_id" value="{{ produto.id }}">
                    <div class="mb-3">
                        <input type="text" name="nome_cliente" class="form-control" placeholder="Seu nome" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Finalizar Compra</button>
                </form>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
