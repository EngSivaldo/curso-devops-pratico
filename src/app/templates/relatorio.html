<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Relatório de Vendas</title>
    <style>
        table { width: 100%; border-collapse: collapse; font-family: sans-serif; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .voltar { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #2196F3; }
    </style>
</head>
<body>
    <h1>📋 Relatório de Vendas DevOps</h1>
    <a href="/" class="voltar">⬅ Voltar para a Loja</a>
    <table>
        <tr>
            <th>ID</th>
            <th>Produto</th>
            <th>Cliente</th>
            <th>Data/Hora</th>
        </tr>
        {% for venda in vendas %}
        <tr>
            <td>{{ venda[0] }}</td>
            <td>{{ venda[1] }}</td>
            <td>{{ venda[3] if venda[3] else 'Não informado' }}</td>
            <td>{{ venda[2].strftime('%d/%m/%Y %H:%M') }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
