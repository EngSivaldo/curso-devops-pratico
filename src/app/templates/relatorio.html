{% extends "base.html" %}

{% block content %}
<div class="card shadow">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <h3 class="mb-0">📋 Relatório de Vendas</h3>
        <a href="/" class="btn btn-sm btn-outline-light">Voltar para a Loja</a>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Produto</th>
                        <th>Cliente</th>
                        <th>Data/Hora</th>
                    </tr>
                </thead>
                <tbody>
                    {% for venda in vendas %}
                    <tr>
                        <td><span class="badge bg-light text-dark border">#{{ venda[0] }}</span></td>
                        <td><strong>{{ venda[1] }}</strong></td>
                        <td>{{ venda[3] if venda[3] else "Visitante" }}</td>
                        <td class="text-muted">{{ venda[2].strftime("%d/%m/%Y %H:%M") }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
